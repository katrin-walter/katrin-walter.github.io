        studyType: Master of Science
        start_date: 2015
        end_date: 2018
        score: ""
        courses: 
          - "Molecular Plant Metabolic Physiology"
          - "Molecular Zoology"
        highlights:
          - Thesis at Alfred Wegener Institut, Bremerhaven
            Validated the Cellular Energy Allocation (CEA) method for a previously unstudied organism group; demonstrated its applicability for quantifying cellular thermal stress. Presented at the SEB Conference, Florence 2018.
          - Isolation and detection of the protein ovastacin, contributing to a reproductive biology project on zona pellucida hardening during fertilization (Stöcker Lab).

      - institution: University of Mainz
        location: Mainz, Germany
        area: Biology
        studyType: Bachelor of Science
        start_date: 2011
        end_date: 2015
        highlights:
          - Thesis at Alfred Wegener Institut, Bremerhaven
            Developed a reproducible protocol for the molecular genetic detection of soluble adenylyl cyclase (sAC) in teleosts, a key enzyme in bicarbonate metabolism. Confirmed by 87% sequence identity to reference sequences. Foundation for follow-up expression studies within the BMBF-funded BIOACID project at AWI.

      - institution: State School for Technical Assistants, Frankfurt University Hospital
        location: Frankfurt, Germany
        area: Medical Laboratory Technician (MLT)
        studyType: vocational training
        start_date: 2008
        end_date: 2012
        highlights: 
           - Applied regulatory standards in a clinical-diagnostic environment, including quality control, validation, and documentation.
           - Histological processing of oncological FFPE tissue samples (embedding, microtomy, staining) as a basis for pathological diagnostics.
           - Processed stem cell samples and performed cryopreservation of umbilical cord blood during the clinical training year.

    Experience:
      - company: Centre of Marine Sciences (CCMAR), University of Algarve, Group MMEB
        position: PhD Candidate
        location: Faro, Portugal
        start_date: 2021
        end_date: current
        summary: 
          - I run end-to-end NGS workflows on Oxford Nanopore platform, from sample to insight; building reproducible pipelines, calling variants in semi-autonomous organelles, profiling host-associated microbiomes across green algae, seagrass, mangroves and sediment, and recovering MAGs to investigate key taxa that drive host success.
        highlights:
          - Established the first end-to-end NGS pipelines in a newly formed group within 6 months and turned them into reusable protocols, cutting onboarding time for new sequencing projects.
          - Cut per-sample sequencing costs by scaling WGS multiplexing from 3 to 24 samples per flowcell with no loss in data quality.
          - Doubled the global reference database for an under-characterized organelle group through systematic variant analysis (SNVs, Indels, heteroplasmies).
          - Identified key microbial taxa driving host success across diverse environments (green algae, seagrass, mangroves, sediment), enabling targeted downstream work.
          - Bridged molecular biology, bioinformatics and microbiology across international collaborations and supervised one Master thesis and three lab interns.

